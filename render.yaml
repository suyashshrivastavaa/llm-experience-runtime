services:
  - type: web
    name: llm-experience-runtime
    runtime: docker
    plan: free
    envVars:
      - key: HF_API_TOKEN
        sync: false
      - key: HF_MODEL
        value: mistralai/Mistral-7B-Instruct-v0.3
      - key: ARTIFACTS_DIR
        value: /data/artifacts
      - key: INDICES_DIR
        value: /data/indices
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: RETRIEVAL_K
        value: "4"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
